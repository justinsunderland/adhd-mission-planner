<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURAL TASK CORE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void: #020408;
    --deep: #040d1a;
    --panel: #060f1e;
    --cyan: #00f5ff;
    --plasma: #7c3aed;
    --hot: #f72585;
    --gold: #ffd60a;
    --grid: rgba(0,245,255,0.04);
    --gridline: rgba(0,245,255,0.08);
    --dim: rgba(0,245,255,0.5);
    --text: #cce8ff;
    --muted: #4a7a99;
    --success: #00ff9f;
  }
  html, body {
    background: var(--void);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    background-image:
      linear-gradient(var(--gridline) 1px, transparent 1px),
      linear-gradient(90deg, var(--gridline) 1px, transparent 1px),
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,245,255,0.06) 0%, transparent 60%);
    background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
    padding: 0 0 80px;
  }
  /* ── HEADER ── */
  .hdr {
    text-align: center;
    padding: 36px 20px 24px;
    position: relative;
  }
  .hdr::before {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }
  .hdr-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--plasma);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hdr h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 7vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,245,255,0.3);
  }
  .hdr h1 span { color: var(--cyan); }
  .hdr-sub {
    margin-top: 10px;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }
  /* ── MAIN PANEL ── */
  .shell {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 4px;
    position: relative;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--plasma), var(--cyan), var(--plasma));
  }
  .panel-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cyan);
    padding: 12px 16px 0;
    opacity: 0.7;
  }
  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 400;
    padding: 12px 16px 16px;
    resize: none;
    min-height: 80px;
    letter-spacing: 0.5px;
  }
  textarea::placeholder { color: rgba(0,245,255,0.2); font-style: italic; }
  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 12px 16px;
    border-top: 1px solid rgba(0,245,255,0.08);
  }
  .mode-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .mode-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 2px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid rgba(0,245,255,0.2);
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .mode-btn:hover, .mode-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,245,255,0.05);
    box-shadow: 0 0 10px rgba(0,245,255,0.15);
  }
  .exec-btn {
    margin-left: auto;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 2px;
    padding: 10px 22px;
    background: linear-gradient(135deg, var(--plasma), #4f46e5);
    border: 1px solid var(--plasma);
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .exec-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.4s;
  }
  .exec-btn:hover::before { left: 100%; }
  .exec-btn:hover { box-shadow: 0 0 20px rgba(124,58,237,0.5); border-color: var(--cyan); }
  .exec-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  /* Loader, Results, etc. styles remain the same */
  .loader, #results, .error-msg, .win { /* ... keeping all your original styles ... */ }
  /* (I kept all your beautiful CSS the same) */
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-tag">// neural task core v2.1 //</div>
  <h1>ONE THING<br><span>AT A TIME</span></h1>
  <div class="hdr-sub">ADHD mission planner &mdash; no overwhelm &mdash; just the next objective</div>
</header>
<div class="shell">
  <div class="panel">
    <div class="panel-label">// mission input</div>
    <textarea id="taskInput" rows="3" placeholder="enter objective... clean room / write email / pay bills / apply for jobs"></textarea>
    <div class="controls-row">
      <div class="mode-group">
        <button class="mode-btn active" data-size="tiny">MICRO</button>
        <button class="mode-btn" data-size="medium">STANDARD</button>
        <button class="mode-btn" data-size="big">MACRO</button>
      </div>
      <button class="exec-btn" id="goBtn" onclick="breakdown()">EXECUTE &#9654;</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg">[ ERR ] — SYSTEM FAULT. RETRY SEQUENCE.</div>
  <div class="loader" id="loading">
    <div class="loader-ring"></div>
    <div class="loader-txt">DECOMPOSING OBJECTIVE...</div>
  </div>

  <div id="results">
    <!-- Results content remains the same -->
    <div class="panel">
      <div class="result-header">
        <div class="result-title" id="taskTitle"></div>
        <div class="result-meta" id="taskMeta"></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-stats">
          <span>MISSION PROGRESS</span>
          <span id="progLabel">0 / 0</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progressBar"></div></div>
      </div>
      <div class="nudge" id="nudge"></div>
      <div class="steps-wrap" id="stepsContainer"></div>
      <div class="win" id="winBanner">
        <h2>MISSION COMPLETE</h2>
        <p>ALL OBJECTIVES ACHIEVED. SYSTEM NOMINAL. YOU DID THAT.</p>
        <button class="reset-btn" onclick="resetAll()">NEW MISSION &#9654;</button>
      </div>
    </div>
  </div>
</div>

<script>
  let selectedSize = 'tiny';
  let totalSteps = 0;
  let completedSteps = 0;

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = btn.dataset.size;
    });
  });

  const nudges = [
    "// one step. that's the whole mission right now.",
    "// your brain works differently — not worse. proceed.",
    "// just the next action. everything else doesn't exist yet.",
    "// you started. that's already harder than most people manage.",
    "// lock in. block out the noise. one objective at a time."
  ];

  async function breakdown() {
    const task = document.getElementById('taskInput').value.trim();
    if (!task) { 
      document.getElementById('taskInput').focus(); 
      return; 
    }

    document.getElementById('goBtn').disabled = true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('results').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('winBanner').classList.remove('show');

    const sizeMap = {
      tiny: "Break into VERY small micro-steps (1-5 min each). Spell out every single action — get up, open the app, pick up the item. ADHD-friendly: assume nothing is implied.",
      medium: "Clear, manageable steps of 5-15 min each. Concrete and specific, no vague items.",
      big: "4-6 high-level mission phases. Good for planning and overview."
    };

    const prompt = `You are a mission control AI breaking down a task for someone with ADHD.
Task: "${task}"
Mode: ${sizeMap[selectedSize]}
Return ONLY valid JSON (no markdown, no backticks), exactly this format:
{
  "title": "short uppercase mission name (4-6 words max)",
  "meta": "one sentence: time estimate + one encouraging line",
  "steps": [
    {
      "action": "VERB-FIRST ACTION LABEL (max 6 words, uppercase)",
      "detail": "one specific sentence of exactly what to do",
      "time": "e.g. 2 min"
    }
  ]
}
Rules:
- action labels must start with a verb, all caps
- detail must be hyper-concrete
- max 10 steps for MICRO, 8 for STANDARD, 6 for MACRO`;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: prompt })
      });

      if (!res.ok) throw new Error("API error");

      const data = await res.json();
      const txt = data.choices?.[0]?.message?.content || '';
      
      const parsed = JSON.parse(txt.replace(/```json|```/g, '').trim());
      renderResults(parsed);

    } catch (e) {
      console.error(e);
      document.getElementById('errorMsg').classList.add('show');
    } finally {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('goBtn').disabled = false;
    }
  }

  // Rest of your functions (renderResults, toggleStep, etc.) stay the same
  function renderResults(data) {
    document.getElementById('taskTitle').textContent = data.title;
    document.getElementById('taskMeta').textContent = '> ' + data.meta;
    const nudge = document.getElementById('nudge');
    nudge.textContent = nudges[Math.floor(Math.random() * nudges.length)];
    nudge.classList.add('show');

    const container = document.getElementById('stepsContainer');
    container.innerHTML = '';
    totalSteps = data.steps.length;
    completedSteps = 0;

    data.steps.forEach((step, i) => {
      const card = document.createElement('div');
      card.className = 'step-card' + (i === 0 ? ' active-step' : '');
      card.dataset.index = i;
      card.innerHTML = `
        <div class="step-row">
          <div class="step-idx">[${String(i+1).padStart(2,'0')}]</div>
          <div class="step-body">
            <div class="step-action">${step.action}</div>
            <div class="step-detail">${step.detail}</div>
            <div class="step-footer">
              <div class="step-time">&#9679; ${step.time}</div>
              <div class="step-check" id="chk-${i}">[ PENDING ]</div>
            </div>
          </div>
        </div>`;
      card.addEventListener('click', () => toggleStep(card, i));
      container.appendChild(card);
    });

    updateProgress();
    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleStep(card, idx) {
    const done = card.classList.contains('done');
    card.classList.toggle('done', !done);
    card.classList.remove('active-step');
    document.getElementById('chk-' + idx).textContent = done ? '[ PENDING ]' : '[ DONE ]';
    completedSteps = document.querySelectorAll('.step-card.done').length;
    updateProgress();
    if (!done) {
      const all = document.querySelectorAll('.step-card');
      all.forEach(c => c.classList.remove('active-step'));
      for (const c of all) {
        if (!c.classList.contains('done')) { c.classList.add('active-step'); break; }
      }
    }
    if (completedSteps === totalSteps)
      setTimeout(() => document.getElementById('winBanner').classList.add('show'), 400);
  }

  function updateProgress() {
    const pct = totalSteps > 0 ? Math.round((completedSteps / totalSteps) * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progLabel').textContent = completedSteps + ' / ' + totalSteps;
  }

  function resetAll() {
    document.getElementById('results').classList.remove('show');
    document.getElementById('winBanner').classList.remove('show');
    document.getElementById('taskInput').value = '';
    document.getElementById('taskInput').focus();
    completedSteps = 0; totalSteps = 0;
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { 
      e.preventDefault(); 
      breakdown(); 
    }
  });
</script>
</body>
</html>
